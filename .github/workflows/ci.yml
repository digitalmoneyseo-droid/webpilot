name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run test:e2e
      - run: npm run cf:check
      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-${{ github.run_attempt }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  visual:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:visual
      - name: Upload visual failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-failure-${{ github.run_attempt }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
